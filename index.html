<style>
/* ============ TOKENS ============ */
:root{
  --bg:#E9E3D4; --surface:#F5F1E8; --raised:#FCFAF4; --sunk:#E1DAC8;
  --ink:#23211B; --ink-soft:#5C574C; --ink-faint:#8C8676;
  --line:#D7D0BE; --line-soft:#E4DECE;
  --primary:#2B2820; --primary-ink:#F6F2E9;
  --ring:#6E6757;
  --danger:#9A4B3B;
  --shadow:0 1px 2px rgba(40,36,28,.05), 0 8px 24px -12px rgba(40,36,28,.18);
  --shadow-pop:0 12px 40px -10px rgba(40,36,28,.32);
  --r:12px; --r-sm:9px; --r-lg:18px;
  --gut:54px;            /* timeline hour-label gutter */
  --hour-h:58px;        /* timeline px per hour */
  --display:'Fraunces','IBM Plex Sans Thai',Georgia,serif;
  --sans:'IBM Plex Sans Thai',system-ui,-apple-system,sans-serif;
  --mono:'JetBrains Mono',ui-monospace,'SF Mono',Menlo,monospace;
}
[data-theme="dark"]{
  --bg:#1A1813; --surface:#221F18; --raised:#2A261E; --sunk:#16140F;
  --ink:#ECE6D6; --ink-soft:#A8A08D; --ink-faint:#6E6757;
  --line:#352F25; --line-soft:#2B2720;
  --primary:#ECE6D6; --primary-ink:#1A1813;
  --ring:#B7AE99;
  --danger:#D08A78;
  --shadow:0 1px 2px rgba(0,0,0,.3), 0 10px 28px -14px rgba(0,0,0,.6);
  --shadow-pop:0 16px 50px -12px rgba(0,0,0,.7);
}

/* ============ BASE ============ */
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  background:var(--bg); color:var(--ink); font-family:var(--sans);
  font-size:15px; line-height:1.5; -webkit-font-smoothing:antialiased;
  min-height:100vh; min-height:100dvh; padding-top:env(safe-area-inset-top,0px);
  transition:background .35s ease, color .35s ease;
}
button{font-family:inherit; cursor:pointer; color:inherit}
input,textarea,select{font-family:inherit; color:inherit}
::selection{background:color-mix(in srgb, var(--ring) 30%, transparent)}
:focus-visible{outline:2px solid var(--ring); outline-offset:2px; border-radius:6px}

/* ============ SHELL ============ */
.shell{max-width:1240px; margin:0 auto; padding:0 max(clamp(12px,3vw,28px),env(safe-area-inset-right,0px)) calc(56px + env(safe-area-inset-bottom,0px)) max(clamp(12px,3vw,28px),env(safe-area-inset-left,0px))}

/* ---- top bar ---- */
.topbar{
  display:flex; align-items:center; gap:16px;
  padding:18px 2px 14px; flex-wrap:wrap;
}
.brand{display:flex; align-items:baseline; gap:11px; margin-right:auto}
.brand h1{
  font-family:var(--display); font-weight:600; font-optical-sizing:auto;
  font-size:clamp(21px,2.4vw,27px); letter-spacing:-.01em; margin:0; line-height:1;
}
.brand .sub{font-size:12.5px; color:var(--ink-faint); letter-spacing:.02em}
.clock{font-family:var(--mono); font-size:13px; color:var(--ink-soft); letter-spacing:.04em; padding-top:2px}
.tools{display:flex; align-items:center; gap:7px}

.icon-btn{
  width:38px; height:38px; display:grid; place-items:center;
  background:var(--surface); border:1px solid var(--line); border-radius:var(--r-sm);
  color:var(--ink-soft); transition:all .18s ease;
}
.icon-btn:hover{background:var(--raised); color:var(--ink); border-color:var(--ring)}
.icon-btn svg{width:18px; height:18px}
.icon-btn.live{position:relative}
.sync-dot{position:absolute; top:7px; right:7px; width:7px; height:7px; border-radius:50%; background:var(--ink-faint); transition:background .25s}
.sync-dot.ok{background:#6f8f5e} .sync-dot.busy{background:#c79a3f; animation:pulse 1s infinite} .sync-dot.pending{background:#c79a3f}
.sync-dot.err{background:var(--danger)} .sync-dot.off{background:var(--ink-faint)}
@keyframes pulse{50%{opacity:.35}}

/* ---- date nav ---- */
.datebar{
  display:flex; align-items:center; gap:10px; flex-wrap:wrap;
  padding:6px 2px 18px;
}
.daynav{display:flex; align-items:center; gap:4px}
.nav-arrow{
  width:34px; height:34px; display:grid; place-items:center; border-radius:9px;
  background:transparent; border:1px solid transparent; color:var(--ink-soft);
}
.nav-arrow:hover{background:var(--surface); border-color:var(--line); color:var(--ink)}
.curdate{display:flex; flex-direction:column; min-width:188px; padding:0 6px}
.curdate .dow{font-family:var(--display); font-weight:600; font-size:19px; line-height:1.15; letter-spacing:-.01em}
.curdate .dnum{font-family:var(--mono); font-size:12.5px; color:var(--ink-soft); letter-spacing:.03em}
.curdate.is-today .dow::after{content:"Today"; font-family:var(--sans); font-size:10px; font-weight:600; color:var(--primary-ink); background:var(--primary); padding:2px 7px; border-radius:20px; margin-left:9px; vertical-align:middle; letter-spacing:0}
.today-btn{
  font-size:13px; font-weight:500; padding:7px 13px; border-radius:9px;
  background:var(--surface); border:1px solid var(--line); color:var(--ink-soft);
}
.today-btn:hover{background:var(--raised); color:var(--ink); border-color:var(--ring)}
.date-pick{position:relative; display:inline-flex}
.date-pick input{
  position:absolute; inset:0; opacity:0; cursor:pointer; width:100%; height:100%;
}

/* ---- week strip ---- */
.week{display:grid; grid-template-columns:repeat(7,1fr); gap:6px; margin-bottom:22px}
.wday{
  display:flex; flex-direction:column; align-items:center; gap:3px;
  padding:9px 0 10px; border-radius:var(--r); background:var(--surface);
  border:1px solid var(--line-soft); transition:all .16s ease; position:relative;
}
.wday:hover{background:var(--raised); border-color:var(--line)}
.wday .lbl{font-size:11px; color:var(--ink-faint); font-weight:500}
.wday .num{font-family:var(--mono); font-size:15px; color:var(--ink-soft); font-weight:500}
.wday.today .num{color:var(--ink)}
.wday.today::before{content:""; width:4px; height:4px; border-radius:50%; background:var(--ring); position:absolute; bottom:5px}
.wday.sel{background:var(--primary); border-color:var(--primary)}
.wday.sel .lbl,.wday.sel .num{color:var(--primary-ink)}
.wday.sel::before{background:var(--primary-ink)}

/* ============ BOARD ============ */
.tabs{display:none}
.board{display:grid; grid-template-columns:1.32fr 1fr 1fr; gap:18px; align-items:start}
.zone{
  background:var(--surface); border:1px solid var(--line-soft); border-radius:var(--r-lg);
  box-shadow:var(--shadow); display:flex; flex-direction:column; min-height:120px;
}
.zone-head{
  display:flex; align-items:center; gap:10px; padding:16px 18px 13px;
  border-bottom:1px solid var(--line-soft);
}
.zone-head .kicker{font-size:11px; font-weight:600; letter-spacing:.14em; color:var(--ink-faint); text-transform:uppercase}
.zone-head h2{font-family:var(--display); font-weight:600; font-size:16.5px; margin:0; letter-spacing:-.01em; line-height:1}
.zone-head .count{font-family:var(--mono); font-size:11.5px; color:var(--ink-faint); margin-left:auto}
.add-btn{
  margin-left:auto; display:inline-flex; align-items:center; gap:6px;
  font-size:13px; font-weight:600; padding:7px 12px; border-radius:9px;
  background:var(--primary); color:var(--primary-ink); border:1px solid var(--primary);
  transition:transform .12s ease, opacity .12s;
}
.add-btn:hover{opacity:.9} .add-btn:active{transform:scale(.97)}
.add-btn svg{width:14px; height:14px}
.zone-body{padding:14px 16px 18px}

/* ---- schedule timeline ---- */
.tl-wrap{position:relative; height:430px; overflow-y:auto; overflow-x:hidden; border-radius:var(--r); background:var(--sunk); border:1px solid var(--line-soft)}
.tl-wrap::-webkit-scrollbar{width:9px}
.tl-wrap::-webkit-scrollbar-thumb{background:var(--line); border-radius:6px; border:2px solid var(--sunk)}
.track{position:relative; margin-left:var(--gut)}
.hour{position:absolute; left:calc(-1 * var(--gut)); right:0; border-top:1px solid var(--line-soft)}
.hour .hh{position:absolute; left:0; top:-8px; width:var(--gut); padding-right:9px; text-align:right; font-family:var(--mono); font-size:10.5px; color:var(--ink-faint)}
.now-line{position:absolute; left:calc(-1 * var(--gut) + 6px); right:4px; height:0; border-top:1.5px dashed var(--danger); z-index:5; pointer-events:none}
.now-line .nlbl{position:absolute; left:-1px; top:-7px; transform:translateX(-100%); padding-right:6px; font-family:var(--mono); font-size:9.5px; color:var(--danger); font-weight:600}
.block{
  position:absolute; border-radius:8px; padding:5px 8px; overflow:hidden; cursor:grab; touch-action:pan-y;
  background:color-mix(in srgb, var(--c) 20%, var(--raised));
  border:1px solid color-mix(in srgb, var(--c) 42%, var(--line));
  border-left:3px solid var(--c);
  transition:filter .14s ease, transform .1s; line-height:1.25; z-index:3;
}
.block:hover{filter:brightness(1.04); z-index:6}
.block:active{transform:scale(.992); cursor:grabbing}
.block.dragging-block{z-index:30 !important; filter:brightness(1.1); box-shadow:var(--shadow-pop); transition:none; cursor:grabbing}
.b-resize{position:absolute; left:0; right:0; height:7px; cursor:ns-resize; touch-action:pan-y; z-index:4}
.b-resize-top{top:0} .b-resize-bot{bottom:0}
.block:hover .b-resize-top{border-top:2px solid color-mix(in srgb, var(--c) 70%, var(--ink))}
.block:hover .b-resize-bot{border-bottom:2px solid color-mix(in srgb, var(--c) 70%, var(--ink))}
.block .b-time{font-family:var(--mono); font-size:10px; color:var(--ink-soft); display:block; margin-bottom:1px}
.b-rec-icon{width:10px; height:10px; display:inline-block; vertical-align:-1px; margin-right:4px; opacity:.7; color:var(--ink)}
.block .b-title{font-size:12.5px; font-weight:500; color:var(--ink); overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
.block.short{padding:3px 8px}
.block.short .b-time{display:inline; margin-right:6px}
.block.short .b-title{display:inline}
.tl-empty{position:absolute; top:0; bottom:0; left:calc(-1 * var(--gut)); right:0; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:7px; color:var(--ink-faint); text-align:center; padding:20px; pointer-events:none}
.tl-empty svg{width:26px; height:26px; opacity:.5}
.tl-empty span{font-size:13px}

/* ---- tasks ---- */
.task-add{display:flex; gap:8px; margin-bottom:12px}
.task-add input{
  flex:1; padding:10px 13px; border-radius:var(--r-sm); background:var(--raised);
  border:1px solid var(--line); font-size:14px; transition:border-color .15s;
}
.task-add input:focus{outline:none; border-color:var(--ring)}
.task-add button{
  width:42px; border-radius:var(--r-sm); background:var(--primary); color:var(--primary-ink);
  border:1px solid var(--primary); display:grid; place-items:center;
}
.task-add button#taskRecurBtn{
  width:38px; background:var(--surface); color:var(--ink-soft); border:1px solid var(--line);
}
.task-add button#taskRecurBtn:hover{background:var(--raised); color:var(--ink); border-color:var(--ring)}
.task-add button#taskRecurBtn svg{width:16px; height:16px}
.task-add button svg{width:16px;height:16px}
.tasklist{list-style:none; margin:0; padding:0; display:flex; flex-direction:column; gap:2px}
.task{
  display:flex; align-items:flex-start; gap:9px; padding:9px 8px; border-radius:var(--r-sm);
  transition:background .14s ease; position:relative;
}
.task:hover{background:var(--raised)}
.task.dragging{background:var(--raised); box-shadow:var(--shadow-pop); opacity:.96}
.grip{
  flex:0 0 auto; width:20px; align-self:stretch; display:grid; place-items:center;
  color:var(--ink-faint); cursor:grab; touch-action:none; border-radius:5px; opacity:0; transition:opacity .14s;
}
.task:hover .grip{opacity:1}
.grip:active{cursor:grabbing}
.grip svg{width:13px;height:13px}
.check{
  flex:0 0 auto; width:20px; height:20px; margin-top:1px; border-radius:6px;
  border:1.8px solid var(--line); background:var(--raised); display:grid; place-items:center;
  transition:all .15s ease;
}
.check:hover{border-color:var(--ring)}
.check svg{width:12px; height:12px; opacity:0; transform:scale(.6); transition:all .15s; color:var(--primary-ink)}
.task.done .check{background:var(--primary); border-color:var(--primary)}
.task.done .check svg{opacity:1; transform:scale(1)}
.t-label{flex:1; font-size:14.5px; padding:1px 2px; border-radius:5px; line-height:1.4; word-break:break-word; min-width:0}
.t-label:focus{outline:none; background:var(--sunk); box-shadow:inset 0 0 0 1px var(--ring)}
.task.done .t-label{color:var(--ink-faint); text-decoration:line-through; text-decoration-color:var(--ink-faint)}
.task.flag .t-label{color:var(--ink)}
.flag-btn{flex:0 0 auto; width:26px; height:26px; display:grid; place-items:center; border-radius:6px; background:transparent; border:none; color:var(--ink-faint); opacity:0; transition:opacity .14s, color .14s}
.task:hover .flag-btn,.task.flag .flag-btn{opacity:1}
.flag-btn svg{width:14px;height:14px}
.task.flag .flag-btn{color:var(--danger)}
.t-del{flex:0 0 auto; width:26px; height:26px; display:grid; place-items:center; border-radius:6px; background:transparent; border:none; color:var(--ink-faint); opacity:0; transition:opacity .14s}
.task:hover .t-del{opacity:1}
.t-del:hover{color:var(--danger)}
.t-del svg{width:14px;height:14px}
.t-rec-icon{flex:0 0 auto; width:22px; height:22px; display:grid; place-items:center; border-radius:6px; background:transparent; border:none; color:var(--ink-faint); padding:0}
.t-rec-icon svg{width:12px; height:12px}
.t-rec-icon:hover{color:var(--ink); background:var(--raised)}
.list-empty{text-align:center; color:var(--ink-faint); font-size:13px; padding:18px 8px 10px}

/* ---- notes ---- */
.notes-area{
  width:100%; min-height:300px; resize:vertical; border-radius:var(--r); padding:14px 15px;
  background:var(--raised); border:1px solid var(--line); font-size:14.5px; line-height:1.65;
  transition:border-color .15s;
}
.notes-area:focus{outline:none; border-color:var(--ring)}
.notes-meta{display:flex; align-items:center; gap:10px; margin-top:9px; font-family:var(--mono); font-size:11px; color:var(--ink-faint)}
.notes-meta .saved{margin-left:auto; transition:opacity .3s; opacity:0}
.notes-meta .saved.show{opacity:1}

/* ============ BUTTONS / FORMS (shared) ============ */
.btn{
  display:inline-flex; align-items:center; justify-content:center; gap:7px;
  font-size:14px; font-weight:500; padding:10px 16px; border-radius:var(--r-sm);
  background:var(--raised); border:1px solid var(--line); transition:all .16s ease;
}
.btn:hover{border-color:var(--ring)}
.btn.primary{background:var(--primary); color:var(--primary-ink); border-color:var(--primary); font-weight:600}
.btn.primary:hover{opacity:.9}
.btn.ghost{background:transparent; border-color:transparent; color:var(--ink-soft)}
.btn.ghost:hover{background:var(--surface); color:var(--ink)}
.btn.danger{color:var(--danger); border-color:color-mix(in srgb,var(--danger) 30%, var(--line))}
.btn.danger:hover{background:color-mix(in srgb,var(--danger) 9%, transparent)}
.btn.sm{padding:7px 12px; font-size:13px}
.field{display:flex; flex-direction:column; gap:6px; margin-bottom:15px}
.field label{font-size:12.5px; font-weight:600; color:var(--ink-soft); letter-spacing:.01em}
.field .hint{font-size:11.5px; color:var(--ink-faint); font-weight:400; line-height:1.4}
.field input[type=text],.field input[type=time],.field input[type=password],.field input[type=date],.field textarea,.field select{
  padding:11px 13px; border-radius:var(--r-sm); background:var(--raised);
  border:1px solid var(--line); font-size:14.5px; transition:border-color .15s;
}
.field input:focus,.field textarea:focus,.field select:focus{outline:none; border-color:var(--ring)}
.row2{display:grid; grid-template-columns:1fr 1fr; gap:12px}
.swatches{display:flex; gap:9px; flex-wrap:wrap}
.swatch{width:32px; height:32px; border-radius:50%; border:2px solid transparent; cursor:pointer; transition:transform .12s; position:relative}
.swatch:hover{transform:scale(1.08)}
.swatch.sel{border-color:var(--ink)}
.swatch.sel::after{content:""; position:absolute; inset:0; border-radius:50%; box-shadow:0 0 0 2px var(--bg) inset}
.checkbox-row{display:flex; align-items:center; gap:10px; padding:4px 0}
.checkbox-row input{width:18px; height:18px; accent-color:var(--primary)}
.checkbox-row label{font-size:14px; color:var(--ink)}
.dow-picker{display:flex; gap:6px; flex-wrap:wrap}
.dow-chip{width:38px; height:38px; border-radius:10px; background:var(--raised); border:1px solid var(--line); font-size:13px; font-weight:600; color:var(--ink-soft); transition:all .14s ease}
.dow-chip:hover{border-color:var(--ring)}
.dow-chip.sel{background:var(--primary); border-color:var(--primary); color:var(--primary-ink)}
.seg-tabs{display:flex; gap:6px; background:var(--sunk); padding:4px; border-radius:10px; margin-bottom:16px}
.seg-tab{flex:1; padding:9px 0; border-radius:7px; background:transparent; border:none; font-size:13px; font-weight:600; color:var(--ink-faint); transition:all .15s ease}
.seg-tab.active{background:var(--primary); color:var(--primary-ink)}
.dow-row{display:flex; align-items:center; gap:8px; flex-wrap:wrap}
.dow-quick{font-size:12px; font-weight:600; padding:8px 11px; border-radius:9px; background:var(--surface); border:1px solid var(--line); color:var(--ink-soft); flex:0 0 auto}
.dow-quick:hover{background:var(--raised); color:var(--ink); border-color:var(--ring)}

/* ============ MODAL ============ */
.overlay{
  position:fixed; inset:0; background:color-mix(in srgb, var(--sunk) 70%, transparent);
  backdrop-filter:blur(3px); display:none; align-items:flex-start; justify-content:center;
  padding:24px 16px; z-index:100; overflow-y:auto;
}
.overlay.open{display:flex; animation:fade .2s ease}
@keyframes fade{from{opacity:0}}
.modal{
  width:100%; max-width:440px; background:var(--surface); border:1px solid var(--line);
  border-radius:var(--r-lg); box-shadow:var(--shadow-pop); margin:auto;
  animation:rise .22s cubic-bezier(.2,.8,.2,1);
}
@keyframes rise{from{opacity:0; transform:translateY(12px) scale(.98)}}
.modal-head{display:flex; align-items:center; gap:10px; padding:18px 20px 14px; border-bottom:1px solid var(--line-soft)}
.modal-head h3{font-family:var(--display); font-weight:600; font-size:18px; margin:0; letter-spacing:-.01em}
.modal-head .x{margin-left:auto; width:32px; height:32px; display:grid; place-items:center; border-radius:8px; background:transparent; border:none; color:var(--ink-faint)}
.modal-head .x:hover{background:var(--raised); color:var(--ink)}
.modal-head .x svg{width:17px;height:17px}
.modal-body{padding:18px 20px}
.modal-foot{display:flex; gap:10px; padding:0 20px 20px}
.modal-foot .btn{flex:1}
.modal-foot .spacer{flex:0 0 auto}
.sync-status{font-family:var(--mono); font-size:11.5px; color:var(--ink-faint); padding:10px 12px; background:var(--raised); border-radius:9px; border:1px solid var(--line-soft); margin-bottom:14px; line-height:1.5; word-break:break-word}
.sync-status.ok{color:#6f8f5e} .sync-status.err{color:var(--danger)}
.divider{height:1px; background:var(--line-soft); margin:16px 0}
.btn-grid{display:grid; grid-template-columns:1fr 1fr; gap:9px}

/* ---- weekly graph ---- */
.graph-nav{display:flex; align-items:center; justify-content:center; gap:14px; margin-bottom:18px}
.graph-wlabel{font-family:var(--mono); font-size:12.5px; color:var(--ink-soft); min-width:150px; text-align:center}
.graph-bars{display:flex; gap:6px; align-items:flex-end; height:140px; margin-bottom:16px; padding:0 2px}
.gbar-col{flex:1; display:flex; flex-direction:column; align-items:center; gap:7px; height:100%}
.gbar-track{width:100%; max-width:30px; height:100%; display:flex; flex-direction:column-reverse; background:var(--sunk); border-radius:6px; overflow:hidden}
.gbar-fill{width:100%; display:flex; flex-direction:column-reverse}
.gbar-seg{width:100%}
.gbar-lbl{font-size:10.5px; color:var(--ink-faint); font-family:var(--mono)}
.gbar-lbl.today{color:var(--ink); font-weight:700}
.graph-total{text-align:center; font-size:13px; color:var(--ink-soft); font-weight:600; margin-bottom:14px}
.graph-legend{display:flex; flex-direction:column; gap:9px}
.glegend-row{display:flex; align-items:center; gap:10px; font-size:13.5px}
.glegend-dot{width:10px; height:10px; border-radius:50%; flex:0 0 auto}
.glegend-name{flex:1; color:var(--ink); overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
.glegend-val{font-family:var(--mono); font-size:12px; color:var(--ink-soft); flex:0 0 auto}

/* ---- category management ---- */
.cat-row{display:flex; align-items:center; gap:9px; padding:8px 2px}
.cat-dot{width:11px; height:11px; border-radius:50%; flex:0 0 auto}
.cat-name-input{flex:1; min-width:0; border:none; background:transparent; font-size:14px; color:var(--ink); padding:7px 6px; border-radius:6px}
.cat-name-input:focus{outline:none; background:var(--raised); box-shadow:inset 0 0 0 1px var(--ring)}
.cat-recolor{width:26px; height:26px; border-radius:50%; border:2px solid var(--line); flex:0 0 auto; padding:0}
.cat-del{width:26px; height:26px; display:grid; place-items:center; border-radius:6px; background:transparent; border:none; color:var(--ink-faint); flex:0 0 auto}
.cat-del:hover{color:var(--danger); background:var(--raised)}

/* ---- carry-over bar ---- */
.carryover-bar{display:flex; align-items:center; gap:10px; padding:9px 12px; margin-bottom:12px; border-radius:var(--r-sm); background:color-mix(in srgb, var(--ring) 14%, var(--raised)); border:1px solid color-mix(in srgb, var(--ring) 30%, var(--line))}
.carryover-bar span{flex:1; font-size:12.5px; color:var(--ink-soft); line-height:1.4}
.carryover-bar button{flex:0 0 auto; font-size:12.5px; font-weight:600; padding:7px 12px; border-radius:8px; background:var(--primary); color:var(--primary-ink); border:1px solid var(--primary)}

/* ---- templates ---- */
.tpl-row{display:flex; align-items:center; gap:9px; padding:9px 2px; border-bottom:1px solid var(--line-soft)}
.tpl-row:last-child{border-bottom:none}
.tpl-info{flex:1; min-width:0; display:flex; flex-direction:column; gap:1px}
.tpl-name-input{border:none; background:transparent; font-size:14px; color:var(--ink); padding:4px; border-radius:5px; width:100%}
.tpl-name-input:focus{outline:none; background:var(--raised); box-shadow:inset 0 0 0 1px var(--ring)}
.tpl-meta{font-size:11px; color:var(--ink-faint); font-family:var(--mono); padding:0 4px}
.tpl-apply{flex:0 0 auto}
.tpl-del{flex:0 0 auto; width:26px; height:26px; display:grid; place-items:center; border-radius:6px; background:transparent; border:none; color:var(--ink-faint)}
.tpl-del:hover{color:var(--danger); background:var(--raised)}

/* ---- dropdown menu ---- */
.menu{
  position:absolute; top:100%; right:0; margin-top:8px; min-width:210px;
  background:var(--surface); border:1px solid var(--line); border-radius:var(--r);
  box-shadow:var(--shadow-pop); padding:6px; z-index:90; display:none;
}
.menu.open{display:block; animation:rise .16s ease}
.menu button{
  width:100%; display:flex; align-items:center; gap:11px; padding:9px 11px;
  border-radius:8px; background:transparent; border:none; font-size:13.5px; text-align:left; color:var(--ink-soft);
}
.menu button:hover{background:var(--raised); color:var(--ink)}
.menu button svg{width:15px; height:15px; flex:0 0 auto; color:var(--ink-faint)}
.menu .sep{height:1px; background:var(--line-soft); margin:5px 4px}
.menu-anchor{position:relative}

/* ---- toast ---- */
.toasts{position:fixed; bottom:calc(22px + env(safe-area-inset-bottom,0px)); left:50%; transform:translateX(-50%); z-index:200; display:flex; flex-direction:column; gap:8px; align-items:center; pointer-events:none}
.toast{
  background:var(--primary); color:var(--primary-ink); padding:11px 14px 11px 18px; border-radius:24px;
  font-size:13.5px; font-weight:500; box-shadow:var(--shadow-pop); animation:toastin .25s ease;
  max-width:88vw; pointer-events:auto; display:flex; align-items:center; gap:14px;
}
.toast-action{
  background:color-mix(in srgb, var(--primary-ink) 16%, transparent); border:none; color:var(--primary-ink);
  font-size:13px; font-weight:700; padding:6px 12px; border-radius:16px; flex:0 0 auto; white-space:nowrap;
}
.toast-action:hover{background:color-mix(in srgb, var(--primary-ink) 26%, transparent)}
@keyframes toastin{from{opacity:0; transform:translateY(10px)}}

/* ============ RESPONSIVE ============ */
@media (max-width:1000px){
  .board{grid-template-columns:1fr 1fr; grid-template-rows:auto auto}
  .zone.zone-schedule{grid-row:1 / span 2; grid-column:1}
  .zone.zone-tasks{grid-column:2; grid-row:1}
  .zone.zone-notes{grid-column:2; grid-row:2}
  .tl-wrap{height:520px}
}
@media (max-width:680px){
  .tabs{
    display:grid; grid-template-columns:repeat(3,1fr); gap:5px; margin-bottom:18px;
    background:var(--surface); padding:5px; border-radius:var(--r); border:1px solid var(--line-soft);
  }
  .tab{
    padding:9px 0; border-radius:8px; background:transparent; border:none; font-size:13.5px;
    font-weight:600; color:var(--ink-faint); transition:all .15s;
  }
  .tab.active{background:var(--primary); color:var(--primary-ink)}
  .board{grid-template-columns:1fr; grid-template-rows:auto}
  .zone{grid-column:1 !important; grid-row:auto !important; display:none}
  body[data-tab="schedule"] .zone-schedule,
  body[data-tab="tasks"] .zone-tasks,
  body[data-tab="notes"] .zone-notes{display:flex}
  .curdate{min-width:0; flex:1}
  .clock{display:none}
  .tl-wrap{height:64vh}
  .brand .sub{display:none}
}
/* prevent iOS Safari auto-zoom on input focus: force inputs >=16px on small screens */
@media (max-width:680px){
  .task-add input, .notes-area,
  .field input[type=text], .field input[type=time], .field input[type=password], .field input[type=date],
  .field textarea, .field select, #codeInput{ font-size:16px; }
}
@media (prefers-reduced-motion:reduce){
  *{animation:none !important; transition:none !important}
}
</style>

function blockColor(b){ const cat=catById(b.categoryId); return cat?cat.color:(b.color||COLORS[0].h); }
function swatchesHtml(selectedColor,idPrefix){
  return COLORS.map(c=>'<button type="button" class="swatch'+(c.h===selectedColor?" sel":"")+'" data-c="'+c.h+'" style="background:'+c.h+'" title="'+c.n+'" aria-label="'+c.n+'"></button>').join("");
}

function keyFromDate(d){return d.getFullYear()+"-"+pad2(d.getMonth()+1)+"-"+pad2(d.getDate());}
function dateFromKey(k){const[y,m,dd]=k.split("-").map(Number);return new Date(y,m-1,dd);}
function todayKey(){return keyFromDate(new Date());}
const hmToMin=s=>{const[h,m]=s.split(":").map(Number);return h*60+(m||0);};
const minToHM=m=>pad2(Math.floor(m/60)%24)+":"+pad2(m%60);
const MON_FRI=[1,2,3,4,5];
function isMonFriFullySelected(daysSet){ return MON_FRI.every(d=>daysSet.has(d)); }
function toggleMonFriSelection(daysSet){
  const allSel=isMonFriFullySelected(daysSet);
  const next=new Set(daysSet);
  MON_FRI.forEach(d=>{ if(allSel) next.delete(d); else next.add(d); });
  return next;
}

/* ===================== safe storage ===================== */
const STORE_KEY="daily-planner-v1";
const mem={};
const storage={
  get(k){try{return localStorage.getItem(k);}catch(e){return k in mem?mem[k]:null;}},
  set(k,v){try{localStorage.setItem(k,v);}catch(e){mem[k]=v;}}
};

/* ===================== state ===================== */
let state=loadState();
let currentKey=todayKey();
let editingBlockId=null;
let syncTimer=null;

function loadState(){
  const raw=storage.get(STORE_KEY);
  if(raw){try{const s=JSON.parse(raw); s.days=s.days||{}; s.settings=s.settings||{}; s.categories=s.categories||[]; s.categoriesUpdated=s.categoriesUpdated||0; s.recurring=s.recurring||[]; s.recurringUpdated=s.recurringUpdated||0; s.templates=s.templates||[]; s.templatesUpdated=s.templatesUpdated||0; s.termRange=s.termRange||null; s.termRangeUpdated=s.termRangeUpdated||0; return s;}catch(e){}}
  return {days:{},settings:{theme:"light",gist:{token:"",gistId:"",pass:"",auto:true}},categories:[],categoriesUpdated:0,recurring:[],recurringUpdated:0,templates:[],templatesUpdated:0,termRange:null,termRangeUpdated:0,lastModified:0};
}
let saveDebounce=null;
function saveState(touch=true){
  if(touch){ state.lastModified=Date.now(); if(state.days[currentKey]) state.days[currentKey].u=state.lastModified; }
  clearTimeout(saveDebounce);
  saveDebounce=setTimeout(()=>{ storage.set(STORE_KEY,JSON.stringify(state)); },180);
  if(touch) scheduleAutoSync();
}
function getDay(k){
  if(!state.days[k]) state.days[k]={blocks:[],tasks:[],note:""};
  const d=state.days[k]; d.blocks=d.blocks||[]; d.tasks=d.tasks||[]; if(d.note==null)d.note="";
  return d;
}

/* ===================== render: date + week ===================== */
function renderDate(){

function renderWeek(){
  const wrap=$("#week"); wrap.innerHTML="";
  const d=dateFromKey(currentKey);
  const start=new Date(d); start.setDate(d.getDate()-d.getDay()); // Sunday
  const tk=todayKey();

    const day=new Date(start); day.setDate(start.getDate()+i);

    el.onclick=()=>{currentKey=k; renderAll();};

/* ===================== render: schedule timeline ===================== */
const HOUR_H=58, PMIN=HOUR_H/60;
function inTermRange(dateKey){
  const tr=state.termRange;
  if(!tr||!tr.start||!tr.end) return true; // term range not set = unrestricted
  return dateKey>=tr.start && dateKey<=tr.end;
}
function recurringBlocksForDate(dateObj,dateKey){
  const dow=dateObj.getDay(), out=[];
  for(const t of (state.recurring||[])){
    if(t.type!=="block")continue;
    if(!t.days||!t.days.includes(dow))continue;
    if(t.skipDates&&t.skipDates.includes(dateKey))continue;
    if(t.isClass && !inTermRange(dateKey))continue;
    out.push({id:"rec:"+t.id,title:t.title,start:t.start,end:t.end,color:t.color,categoryId:t.categoryId,note:t.note,isRecurring:true,recurringId:t.id,isClass:!!t.isClass,room:t.room||null});
  }
  return out;
}
function layoutBlocks(blocks){
  const sorted=[...blocks].map(b=>{let s=hmToMin(b.start),e=hmToMin(b.end); if(e<=s)e+=1440; return {...b,_s:s,_e:e};})
    .sort((a,b)=>a._s-b._s||a._e-b._e);
  let cols=[], group=[], lastEnd=-1, maxCols=0;
  const flush=()=>{ group.forEach(b=>b._ncols=maxCols); group=[]; cols=[]; maxCols=0; lastEnd=-1; };
  for(const b of sorted){
    if(group.length && b._s>=lastEnd) flush();
    let placed=false;
    for(let i=0;i<cols.length;i++){ if(cols[i]<=b._s){cols[i]=b._e; b._col=i; placed=true; break;} }
    if(!placed){ b._col=cols.length; cols.push(b._e); }
    maxCols=Math.max(maxCols,cols.length);
    group.push(b); lastEnd=Math.max(lastEnd,b._e);
  }
  flush();
  return sorted;
}
function renderSchedule(){
  const track=$("#track");
  track.innerHTML="";
  const day=getDay(currentKey);
  const dateObj=dateFromKey(currentKey);
  const visibleBlocks=[...day.blocks,...recurringBlocksForDate(dateObj,currentKey)];
  if(visibleBlocks.length===0){
    track.style.height="100%";
    const e=document.createElement("div");
    e.className="tl-empty";
    e.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18M8 14h.01M12 14h.01M16 14h.01M8 18h.01M12 18h.01"/></svg><span>No time blocks yet<br>Tap the timeline or the "Block" button to add one</span>';
    track.appendChild(e);
    return;
  }
  track.style.height=(24*HOUR_H)+"px";
  // hour gridlines
  for(let h=0;h<=24;h++){
    const line=document.createElement("div");
    line.className="hour"; line.style.top=(h*HOUR_H)+"px";
    if(h<24) line.innerHTML='<span class="hh">'+pad2(h)+":00</span>";
    track.appendChild(line);
  }
  const laid=layoutBlocks(visibleBlocks);
  for(const b of laid){
    const top=b._s*PMIN, height=(Math.min(b._e,1440)-b._s)*PMIN;
    const gap=3, w=(100/b._ncols);
    const el=document.createElement("div");
    el.className="block"+(height<34?" short":"");
    el.style.top=top+"px";
    el.style.height=(height-2)+"px";
    el.style.left="calc("+(b._col*w)+"% + "+(b._col>0?gap:0)+"px)";
    el.style.width="calc("+w+"% - "+(b._ncols>1?gap+2:6)+"px)";
    el.style.setProperty("--c",blockColor(b));
    const recIcon=b.isRecurring?'<svg class="b-rec-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M17 2l4 4-4 4M3 11V9a4 4 0 0 1 4-4h14M7 22l-4-4 4-4M21 13v2a4 4 0 0 1-4 4H3"/></svg>':"";
    const displayTitle=(b.isClass&&b.room)?((b.title||"(Untitled)")+" · "+b.room):(b.title||"(Untitled)");
    el.innerHTML='<div class="b-resize b-resize-top"></div>'+recIcon+'<span class="b-time">'+b.start+"–"+b.end+'</span><span class="b-title">'+escapeHtml(displayTitle)+'</span><div class="b-resize b-resize-bot"></div>';
    el.onclick=ev=>{ev.stopPropagation(); if(el.dataset.justDragged)return; if(b.isRecurring)openRecurringBlockModal(b.recurringId,currentKey); else openBlockModal(b.id);};
    attachBlockDrag(el,b,currentKey);
    track.appendChild(el);
  }
  drawNowLine();
}
let nowEl=null;
function drawNowLine(){
  const track=$("#track"); if(!track) return;
  if(nowEl&&nowEl.parentNode)nowEl.remove();
  if(currentKey!==todayKey())return;
  const now=new Date(); const mins=now.getHours()*60+now.getMinutes();
  nowEl=document.createElement("div");
  nowEl.className="now-line"; nowEl.style.top=(mins*PMIN)+"px";
  nowEl.innerHTML='<span class="nlbl">'+pad2(now.getHours())+":"+pad2(now.getMinutes())+'</span>';
  track.appendChild(nowEl);
}
// click empty timeline → add block prefilled
$("#track").addEventListener("click",ev=>{
  if(ev.target.closest(".block"))return;
  const rect=$("#track").getBoundingClientRect();
  const y=ev.clientY-rect.top;
  let mins=clamp(Math.round((y/PMIN)/15)*15,0,24*60-15);
  openBlockModal(null,mins);
});

/* ---- drag/resize block directly on timeline ---- */
function attachBlockDrag(el,b,dayKeyAtRender){
  const MIN_DUR=15, THRESH=4, LONG_PRESS_MS=250, TOUCH_CANCEL_PX=8;
  let downX=0, downY=0, moved=false, startTop=0, startHeight=0, mode=null;
  let longPressTimer=null, activeTarget=null, activePointerId=null;
  function pxToSnapMin(px){ return Math.round((px/PMIN)/15)*15; }
  function activateTouchDrag(){
    longPressTimer=null; moved=true;
    el.classList.add("dragging-block");
    if(activeTarget) activeTarget.style.touchAction="none";
    if(navigator.vibrate){ try{ navigator.vibrate(12); }catch(_){} }
  }
  function cleanupListeners(){
    document.removeEventListener("pointermove",onMove);
    document.removeEventListener("pointerup",onUp);
    document.removeEventListener("pointercancel",onCancel);
  }
  function resetTouchAction(){
    if(activeTarget){ activeTarget.style.touchAction=""; activeTarget=null; }
  }
  function onDown(ev,m){
    if(ev.button!=null && ev.button!==0)return;
    const isTouch=ev.pointerType==="touch"||ev.pointerType==="pen";
    ev.stopPropagation();
    mode=m; moved=false; downX=ev.clientX; downY=ev.clientY;
    startTop=parseFloat(el.style.top); startHeight=parseFloat(el.style.height);
    activePointerId=ev.pointerId; activeTarget=ev.currentTarget;
    clearTimeout(longPressTimer); longPressTimer=null;
    if(isTouch){ longPressTimer=setTimeout(activateTouchDrag,LONG_PRESS_MS); }
    document.addEventListener("pointermove",onMove);
    document.addEventListener("pointerup",onUp,{once:true});
    document.addEventListener("pointercancel",onCancel,{once:true});
  }
  function onMove(ev){
    if(activePointerId!=null && ev.pointerId!==activePointerId)return;
    const dx=ev.clientX-downX, dy=ev.clientY-downY;
    const isTouch=ev.pointerType==="touch"||ev.pointerType==="pen";
    if(isTouch && longPressTimer){
      // still waiting for the long-press to complete: any real movement means
      // the person is scrolling the timeline, not trying to grab the block.
      if(Math.abs(dx)>TOUCH_CANCEL_PX || Math.abs(dy)>TOUCH_CANCEL_PX){
        clearTimeout(longPressTimer); longPressTimer=null;
        cleanupListeners(); resetTouchAction(); mode=null;
      }
      return;
    }
    if(!isTouch && !moved && Math.abs(dy)>THRESH){ moved=true; el.classList.add("dragging-block"); }
    if(!moved)return;
    if(mode==="move"){ el.style.top=(startTop+dy)+"px"; }
    else if(mode==="resize-top"){ const nh=startHeight-dy; if(nh>=MIN_DUR*PMIN-2){ el.style.top=(startTop+dy)+"px"; el.style.height=nh+"px"; } }
    else if(mode==="resize-bot"){ const nh=startHeight+dy; if(nh>=MIN_DUR*PMIN-2){ el.style.height=nh+"px"; } }
  }
  function onCancel(){
    clearTimeout(longPressTimer); longPressTimer=null;
    cleanupListeners();
    el.classList.remove("dragging-block");
    resetTouchAction();
    moved=false; mode=null;
  }
  function onUp(){
    clearTimeout(longPressTimer); longPressTimer=null;
    cleanupListeners();
    el.classList.remove("dragging-block");
    resetTouchAction();
    if(!moved){ mode=null; return; }
    el.dataset.justDragged="1"; setTimeout(()=>{delete el.dataset.justDragged;},80);
    const target=b.isRecurring?(state.recurring||[]).find(t=>t.id===b.recurringId):getDay(dayKeyAtRender).blocks.find(x=>x.id===b.id);
    if(target){
      if(mode==="move"){
        const s0=hmToMin(target.start), e0=hmToMin(target.end);
        const dur=e0<=s0?(e0+1440-s0):(e0-s0);
        const newStart=clamp(pxToSnapMin(parseFloat(el.style.top)),0,1439);
        target.start=minToHM(newStart); target.end=minToHM(newStart+dur);
      }else if(mode==="resize-top"){
        const endMin=hmToMin(target.end);
        const newStart=clamp(pxToSnapMin(parseFloat(el.style.top)),0,endMin-MIN_DUR);
        target.start=minToHM(newStart);
      }else if(mode==="resize-bot"){
        const startMin=hmToMin(target.start);
        const newEnd=clamp(startMin+pxToSnapMin(parseFloat(el.style.height)+2),startMin+MIN_DUR,1440);
        target.end=minToHM(newEnd);
      }
      if(b.isRecurring){ target.u=Date.now(); state.recurringUpdated=Date.now(); }
      saveState();
    }
    if(currentKey===dayKeyAtRender) renderSchedule();
    mode=null; moved=false;
  }
  el.addEventListener("pointerdown",ev=>{ if(ev.target.classList.contains("b-resize"))return; onDown(ev,"move"); });
  const th=el.querySelector(".b-resize-top"), bh=el.querySelector(".b-resize-bot");
  if(th) th.addEventListener("pointerdown",ev=>onDown(ev,"resize-top"));
  if(bh) bh.addEventListener("pointerdown",ev=>onDown(ev,"resize-bot"));
}

      const classCount=(state.recurring||[]).filter(t=>t.isClass).length;
      const clsColor=COLORS[classCount%COLORS.length].h;
      const tmpl={id:uid(),type:"block",title:subject,room:room||null,isClass:true,start:cst,end:cen,color:clsColor,categoryId:null,note:"",days:[...clsDaysSel].sort(),skipDates:[],u:Date.now()};
      state.recurring=state.recurring||[]; state.recurring.push(tmpl);
      state.recurringUpdated=Date.now();
      saveState(); closeModal(); renderSchedule();
      toast("Added "+subject+" to your class schedule");
      return;
    }
    const title=$("#bTitle").value.trim();
    let st=$("#bStart").value, en=$("#bEnd").value;
    if(!st||!en){toast("Enter both start and end time");return;}
    if(hmToMin(en)===hmToMin(st)){ en=minToHM((hmToMin(st)+30)%1440); }
    const catId=(catSel.value&&catSel.value!=="__new__")?catSel.value:"";
    const cat=catId?state.categories.find(c=>c.id===catId):null;
    const finalColor=cat?cat.color:chosen;
    const noteVal=$("#bNote").value.trim();
    if(!id){
      const rt=$("#bRecurToggle");
      if(rt&&rt.checked){
        if(recurDays.size===0){toast("Choose at least 1 day to repeat on");return;}
        const tmpl={id:uid(),type:"block",title:title||"(Untitled)",start:st,end:en,color:finalColor,categoryId:catId||null,note:noteVal,days:[...recurDays].sort(),skipDates:[],u:Date.now()};
        state.recurring=state.recurring||[]; state.recurring.push(tmpl);
        state.recurringUpdated=Date.now();
        saveState(); closeModal(); renderSchedule();
        toast("Recurring block created");
        return;
      }
    }
    const day=getDay(currentKey);
    if(id){ const blk=day.blocks.find(x=>x.id===id); Object.assign(blk,{title,start:st,end:en,color:finalColor,categoryId:catId||null,note:noteVal}); }
    else{ day.blocks.push({id:uid(),title:title||"(Untitled)",start:st,end:en,color:finalColor,categoryId:catId||null,note:noteVal}); }
    saveState(); closeModal(); renderSchedule();
    toast(id?"Block updated":"Block added");
  };
  if(id){ $("#bDelete").onclick=()=>{
    const dk=currentKey, day=getDay(dk), removed=day.blocks.find(x=>x.id===id);
    day.blocks=day.blocks.filter(x=>x.id!==id);
    saveState(); closeModal(); renderSchedule();
    pushUndo(()=>{ const d=getDay(dk); d.blocks.push(removed); saveState(); if(currentKey===dk)renderSchedule(); });
    toast("Block deleted","Undo",()=>{ if(lastUndo)lastUndo.restoreFn(); });
  }; }
  setTimeout(()=>$("#bTitle").focus(),60);
}

/* ===================== weekly graph ===================== */
function weekCategoryData(weekStart){
  const days=[];
  for(let i=0;i<7;i++){
    const d=new Date(weekStart); d.setDate(weekStart.getDate()+i);
    const key=keyFromDate(d);
    const dd=state.days[key];
    const byCat={}; let total=0;
    if(dd&&dd.blocks){
      for(const b of dd.blocks){
        const s=hmToMin(b.start), e=hmToMin(b.end);
        const dur=e<=s?(e+1440-s):(e-s);
        const cid=b.categoryId&&catById(b.categoryId)?b.categoryId:"_none";
        byCat[cid]=(byCat[cid]||0)+dur; total+=dur;
      }
    }
    days.push({key,date:d,byCat,total});
  }
  return days;
}
function fmtHM(m){ const h=Math.floor(m/60), mm=Math.round(m%60); if(h<=0)return mm+"m"; return h+"h"+(mm>0?" "+mm+"m":""); }
function renderGraphBars(days){
  const trackH=140;
  const maxTotal=Math.max(1,...days.map(d=>d.total));
  const catOrder=[...(state.categories||[]).map(c=>c.id),"_none"];
  const tk=todayKey();
  return days.map(d=>{
    const barH=d.total>0?Math.max(3,(d.total/maxTotal)*trackH):0;
    let segs="";
    if(d.total>0){
      for(const cid of catOrder){
        const dur=d.byCat[cid]; if(!dur)continue;
        const segH=(dur/d.total)*barH;
        const cat=cid==="_none"?null:catById(cid);
        const color=cat?cat.color:"var(--ink-faint)";
        const nm=cat?cat.name:"No category";
        segs+='<div class="gbar-seg" style="height:'+segH+'px;background:'+color+'" title="'+escapeAttr(nm)+' '+fmtHM(dur)+'"></div>';
      }
    }
    const isToday=d.key===tk;
    return '<div class="gbar-col"><div class="gbar-track"><div class="gbar-fill" style="height:'+barH+'px">'+segs+'</div></div><span class="gbar-lbl'+(isToday?" today":"")+'">'+DOW_SHORT[d.date.getDay()]+' '+d.date.getDate()+'</span></div>';
  }).join("");
}
function renderGraphLegend(days){
  const totals={}; let grand=0;
  for(const d of days){ for(const cid in d.byCat){ totals[cid]=(totals[cid]||0)+d.byCat[cid]; grand+=d.byCat[cid]; } }
  const catOrder=[...(state.categories||[]).map(c=>c.id),"_none"];
  let html="";
  for(const cid of catOrder){
    const m=totals[cid]; if(!m)continue;
    const cat=cid==="_none"?null:catById(cid);
    const nm=cat?escapeHtml(cat.name):"No category";
    const color=cat?cat.color:"var(--ink-faint)";
    html+='<div class="glegend-row"><span class="glegend-dot" style="background:'+color+'"></span><span class="glegend-name">'+nm+'</span><span class="glegend-val">'+fmtHM(m)+'</span></div>';
  }
  if(!html) html='<div class="list-empty">No data for this week yet</div>';
  return {html,grandLabel:grand>0?("Total "+fmtHM(grand)):"No data for this week yet"};
}
let graphWeekStart=null;
function renderGraphModalContent(){
  const days=weekCategoryData(graphWeekStart);
  const {html:legendHtml,grandLabel}=renderGraphLegend(days);
  const barsHtml=renderGraphBars(days);
  const endW=new Date(graphWeekStart); endW.setDate(graphWeekStart.getDate()+6);
  const label=graphWeekStart.getDate()+" "+MON_SHORT[graphWeekStart.getMonth()]+" – "+endW.getDate()+" "+MON_SHORT[endW.getMonth()]+" "+endW.getFullYear();
  openModal(`
    <div class="modal-head"><h3>Weekly Time Summary</h3>
      <button class="x" data-close aria-label="Close"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg></button></div>
    <div class="modal-body">
      <div class="graph-nav">
        <button class="nav-arrow" id="gwPrev" aria-label="Previous week"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg></button>
        <span class="graph-wlabel">${label}</span>
        <button class="nav-arrow" id="gwNext" aria-label="Next week"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg></button>
      </div>
      <div class="graph-bars">${barsHtml}</div>
      <div class="graph-total">${grandLabel}</div>
      <div class="graph-legend">${legendHtml}</div>
    </div>
    <div class="modal-foot"><button class="btn sm" id="manageCatBtn">Manage categories</button><button class="btn primary" data-close>Close</button></div>
  `);
  $("#gwPrev").onclick=()=>{ graphWeekStart.setDate(graphWeekStart.getDate()-7); renderGraphModalContent(); };
  $("#gwNext").onclick=()=>{ graphWeekStart.setDate(graphWeekStart.getDate()+7); renderGraphModalContent(); };
  $("#manageCatBtn").onclick=()=>openCategoryManageModal();
}

/* ===================== tasks ===================== */
function materializeRecurringTasksForDay(key){
  const dObj=dateFromKey(key), dow=dObj.getDay();
  const day=getDay(key);
  let changed=false;
  for(const t of (state.recurring||[])){
    if(t.type!=="task")continue;
    if(!t.days||!t.days.includes(dow))continue;
    t.materializedDates=t.materializedDates||[];
    if(t.materializedDates.includes(key))continue;
    day.tasks.push({id:uid(),text:t.title,done:false,flag:false,recurringId:t.id});
    t.materializedDates.push(key);
    changed=true;
  }
  if(changed){ state.recurringUpdated=Date.now(); saveState(false); }
  return changed;
}
/* ---- carry-over pending tasks from previous days ---- */
function getPendingCarryoverTasks(){
  const tk=todayKey(), out=[];
  const keys=Object.keys(state.days).filter(k=>k<tk).sort();
  for(const k of keys){
    const d=state.days[k]; if(!d||!d.tasks)continue;
    for(const t of d.tasks){
      if(t.done||t.recurringId)continue; // recurring tasks materialize their own instances, no need to carry over
      out.push({dayKey:k,taskId:t.id});
    }
  }
  return out;
}
function updateCarryoverBar(){
  const bar=$("#carryoverBar"); if(!bar)return;
  if(currentKey!==todayKey()){ bar.style.display="none"; return; }
  const pending=getPendingCarryoverTasks();
  if(pending.length===0){ bar.style.display="none"; return; }
  bar.style.display="";
  $("#carryoverText").textContent=pending.length+" pending task(s) from previous days";
}
function carryOverPendingTasks(){
  const pending=getPendingCarryoverTasks();
  if(pending.length===0)return;
  const today=getDay(todayKey());
  const now=Date.now();
  const snapshot=[];
  for(const p of pending){
    const d=state.days[p.dayKey]; if(!d)continue;
    const idx=d.tasks.findIndex(x=>x.id===p.taskId); if(idx<0)continue;
    const [task]=d.tasks.splice(idx,1);
    snapshot.push({dayKey:p.dayKey,task});
    today.tasks.push(task);
    d.u=now;
  }
  if(snapshot.length===0)return;
  saveState(true);
  renderTasks();
  pushUndo(()=>{
    const now2=Date.now(), t2=getDay(todayKey());
    for(const s of snapshot){
      t2.tasks=t2.tasks.filter(x=>x.id!==s.task.id);
      const d=getDay(s.dayKey); d.tasks.push(s.task); d.u=now2;
    }
    saveState(true); renderTasks();
  });
  toast(snapshot.length+" task(s) moved to today","Undo",()=>{ if(lastUndo)lastUndo.restoreFn(); });
}
$("#carryoverBtn").onclick=carryOverPendingTasks;
function renderTasks(){
  materializeRecurringTasksForDay(currentKey);
  updateCarryoverBar();
  const day=getDay(currentKey);
  const list=$("#taskList"); list.innerHTML="";
  const done=day.tasks.filter(t=>t.done).length;
  $("#taskCount").textContent=day.tasks.length?done+"/"+day.tasks.length:"";
  if(day.tasks.length===0){
    list.innerHTML='<li class="list-empty">No tasks for today yet</li>'; return;
  }
  for(const t of day.tasks){
    const li=document.createElement("li");
    li.className="task"+(t.done?" done":"")+(t.flag?" flag":"");
    li.dataset.id=t.id;
    const recBadge=t.recurringId?'<button type="button" class="t-rec-icon" aria-label="Manage recurring task"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M17 2l4 4-4 4M3 11V9a4 4 0 0 1 4-4h14M7 22l-4-4 4-4M21 13v2a4 4 0 0 1-4 4H3"/></svg></button>':"";
    li.innerHTML=`
      <span class="grip" aria-label="Drag to reorder"><svg viewBox="0 0 24 24" fill="currentColor"><circle cx="9" cy="6" r="1.4"/><circle cx="15" cy="6" r="1.4"/><circle cx="9" cy="12" r="1.4"/><circle cx="15" cy="12" r="1.4"/><circle cx="9" cy="18" r="1.4"/><circle cx="15" cy="18" r="1.4"/></svg></span>
      <button class="check" aria-label="Mark done"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg></button>
      <span class="t-label" role="textbox" tabindex="0">${escapeHtml(t.text)}</span>
      ${recBadge}
      <button class="flag-btn" aria-label="Mark important"><svg viewBox="0 0 24 24" fill="${t.flag?'currentColor':'none'}" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 21V4h13l-2.5 4L17 12H4"/></svg></button>
      <button class="t-del" aria-label="Delete task"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6"/></svg></button>`;
    const t_id=t.id;
    $(".check",li).onclick=()=>{const x=day.tasks.find(z=>z.id===t_id);x.done=!x.done;saveState();renderTasks();};
    $(".flag-btn",li).onclick=()=>{const x=day.tasks.find(z=>z.id===t_id);x.flag=!x.flag;saveState();renderTasks();};
    if(t.recurringId){ const ri=$(".t-rec-icon",li); if(ri) ri.onclick=ev=>{ev.stopPropagation(); openRecurringTaskManageModal(t.recurringId);}; }
    $(".t-del",li).onclick=()=>{
      const dk=currentKey, idx=day.tasks.findIndex(z=>z.id===t_id), removed=day.tasks[idx];
      day.tasks=day.tasks.filter(z=>z.id!==t_id);
      saveState();renderTasks();
      pushUndo(()=>{ const d=getDay(dk); d.tasks.splice(Math.min(idx,d.tasks.length),0,removed); saveState(); if(currentKey===dk)renderTasks(); });
      toast("Task deleted","Undo",()=>{ if(lastUndo)lastUndo.restoreFn(); });
    };
    // inline edit
    const lbl=$(".t-label",li);
    lbl.onclick=()=>{ if(lbl.isContentEditable)return; lbl.contentEditable="true"; lbl.focus(); placeCaretEnd(lbl); };
    lbl.onkeydown=e=>{ if(e.key==="Enter"){e.preventDefault();lbl.blur();} if(e.key==="Escape"){lbl.textContent=t.text;lbl.blur();} };

/* drag reorder (pointer-based, touch-safe via touch-action:none on handle) */
let drag=null;
function startDrag(e,item){
  e.preventDefault();
  drag={item,list:$("#taskList")};
  item.classList.add("dragging");
  try{item.setPointerCapture(e.pointerId);}catch(_){}
  document.addEventListener("pointermove",onDragMove);
  document.addEventListener("pointerup",onDragEnd,{once:true});
}
function onDragMove(e){
  if(!drag)return;
  const sibs=$$(".task:not(.dragging)",drag.list);
  const after=sibs.find(s=>{const r=s.getBoundingClientRect();return e.clientY<r.top+r.height/2;});
  if(after)drag.list.insertBefore(drag.item,after); else drag.list.appendChild(drag.item);
}
function onDragEnd(){
  if(!drag)return;
  document.removeEventListener("pointermove",onDragMove);
  const order=$$(".task",drag.list).map(el=>el.dataset.id);
  const day=getDay(currentKey);
  day.tasks.sort((a,b)=>order.indexOf(a.id)-order.indexOf(b.id));
  drag.item.classList.remove("dragging"); drag=null;
  saveState(); renderTasks();
}

/* ===================== encryption (Web Crypto) ===================== */
const cryptoOk=!!(window.crypto&&crypto.subtle);
function b64(bytes){let s="";const c=0x8000;for(let i=0;i<bytes.length;i+=c)s+=String.fromCharCode.apply(null,bytes.subarray(i,i+c));return btoa(s);}
function unb64(str){const bin=atob(str);const a=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)a[i]=bin.charCodeAt(i);return a;}
async function deriveKey(pass,salt){
  const km=await crypto.subtle.importKey("raw",new TextEncoder().encode(pass),"PBKDF2",false,["deriveKey"]);
  return crypto.subtle.deriveKey({name:"PBKDF2",salt,iterations:120000,hash:"SHA-256"},km,{name:"AES-GCM",length:256},false,["encrypt","decrypt"]);
}
async function encryptStr(text,pass){
  const salt=crypto.getRandomValues(new Uint8Array(16)), iv=crypto.getRandomValues(new Uint8Array(12));
  const key=await deriveKey(pass,salt);
  const ct=new Uint8Array(await crypto.subtle.encrypt({name:"AES-GCM",iv},key,new TextEncoder().encode(text)));
  const blob=new Uint8Array(salt.length+iv.length+ct.length);
  blob.set(salt,0);blob.set(iv,16);blob.set(ct,28);
  return "ENCv1:"+b64(blob);
}
async function decryptStr(payload,pass){
  const blob=unb64(payload.slice(6));
  const salt=blob.slice(0,16), iv=blob.slice(16,28), ct=blob.slice(28);
  const key=await deriveKey(pass,salt);
  const pt=await crypto.subtle.decrypt({name:"AES-GCM",iv},key,ct);
  return new TextDecoder().decode(pt);
}

/* ===================== Gist sync ===================== */
const GIST_FILE="daily-planner-data.json";
function gcfg(){return state.settings.gist||(state.settings.gist={token:"",gistId:"",pass:"",auto:true});}
async function gistApi(method,path,body){
  const res=await fetch("https://api.github.com/gists"+path,{
    method,
    headers:{"Authorization":"Bearer "+gcfg().token,"Accept":"application/vnd.github+json","Content-Type":"application/json"},
    body:body?JSON.stringify(body):undefined
  });
  if(!res.ok){const t=await res.text().catch(()=>"");throw new Error("GitHub "+res.status+(res.status===401?" (invalid token)":res.status===404?" (Gist not found)":"")+" "+t.slice(0,80));}
  return res.json();
}
async function buildPayload(){
  const days={};
  for(const k in state.days){
    const d=state.days[k];
    const empty=!(d.blocks&&d.blocks.length)&&!(d.tasks&&d.tasks.length)&&!(d.note&&String(d.note).trim());
    if(empty && d.u==null) continue;
    days[k]=d;
  }
  const obj={days,categories:state.categories||[],categoriesUpdated:state.categoriesUpdated||0,recurring:state.recurring||[],recurringUpdated:state.recurringUpdated||0,templates:state.templates||[],templatesUpdated:state.templatesUpdated||0,termRange:state.termRange||null,termRangeUpdated:state.termRangeUpdated||0,lastModified:state.lastModified,_v:6};
  let content=JSON.stringify(obj);
  if(gcfg().pass){ if(!cryptoOk)throw new Error("This browser can't encrypt"); content=await encryptStr(content,gcfg().pass); }
  return content;
}
async function parsePayload(content){
  if(content.startsWith("ENCv1:")){ if(!cryptoOk)throw new Error("Data is encrypted, but this browser can't decrypt it"); if(!gcfg().pass)throw new Error("Data is encrypted — enter the matching passphrase"); content=await decryptStr(content,gcfg().pass); }
  return JSON.parse(content);
}
/* merge per-"day": whichever side was edited later (newer u) wins — edits to different days on different devices never collide */
function mergeDays(remoteDays){
  let changed=false;
  for(const k in remoteDays){
    const r=remoteDays[k]; if(!r)continue;
    const l=state.days[k];
    if(!l || (r.u||0)>(l.u||0)){ state.days[k]=r; changed=true; }
  }
  return changed;
}
/* merge categories: compare last-edit time for the whole set, newer side wins the whole set (small list, edited rarely, no need for per-item merge) */
function mergeCategories(remoteCats,remoteUpdated){
  if(remoteCats && (remoteUpdated||0)>(state.categoriesUpdated||0)){
    state.categories=remoteCats; state.categoriesUpdated=remoteUpdated||0; return true;
  }
  return false;
}
/* merge recurring blocks/tasks: same principle as categories — whole set, last-write-wins */
function mergeRecurring(remoteRec,remoteUpdated){
  if(remoteRec && (remoteUpdated||0)>(state.recurringUpdated||0)){
    state.recurring=remoteRec; state.recurringUpdated=remoteUpdated||0; return true;
  }
  return false;
}
/* merge templates: same principle — whole set, last-write-wins */
function mergeTemplates(remoteTpl,remoteUpdated){
  if(remoteTpl && (remoteUpdated||0)>(state.templatesUpdated||0)){
    state.templates=remoteTpl; state.templatesUpdated=remoteUpdated||0; return true;
  }
  return false;
}
/* merge term range: also whole-value last-write-wins (single value across the whole system) */
function mergeTermRange(remoteRange,remoteUpdated){
  if(remoteRange && (remoteUpdated||0)>(state.termRangeUpdated||0)){
    state.termRange=remoteRange; state.termRangeUpdated=remoteUpdated||0; return true;
  }
  return false;
}
function setSyncDot(s){ const d=$("#syncDot"); if(d) d.className="sync-dot "+s; }
function setSyncStatus(msg,cls){ const e=$("#syncStatus"); if(e){e.textContent=msg; e.className="sync-status"+(cls?" "+cls:"");} }
function updateSyncTitle(st){ const b=$("#syncBtn"); if(!b)return; b.title = st==="pending"?"Unsynced changes" : st==="busy"?"Syncing..." : st==="err"?"Sync issue — tap to retry" : "Sync data"; }

/* Sync Code: combines token + gist id + passphrase into one code, move devices in a single step */
function makeSyncCode(){
  const c=gcfg();
  const json=JSON.stringify({t:c.token||"",g:c.gistId||"",p:c.pass||""});
  return "DPSYNC1:"+b64(new TextEncoder().encode(json));
}
function applySyncCode(code){
  code=(code||"").trim().replace(/^["']|["']$/g,"");
  const idx=code.search(/DPSYNC1:/i);
  if(idx<0)throw new Error("Invalid code format");
  let payload=code.slice(idx+8).replace(/\s+/g,"").replace(/[^A-Za-z0-9+/=].*$/,"");
  if(!payload)throw new Error("Invalid code format");
  const o=JSON.parse(new TextDecoder().decode(unb64(payload)));
  const c=gcfg(); c.token=o.t||""; c.gistId=o.g||""; c.pass=o.p||""; saveState(false);
}
async function copyText(txt){
  try{ await navigator.clipboard.writeText(txt); return true; }
  catch(e){
    try{ const ta=document.createElement("textarea"); ta.value=txt; ta.style.position="fixed"; ta.style.opacity="0"; document.body.appendChild(ta); ta.focus(); ta.select(); document.execCommand("copy"); ta.remove(); return true; }
    catch(_){ return false; }
  }
}

/* syncNow = pull-merge-push (main path, safe across multiple devices) */
let syncing=false;
async function syncNow(silent){
  const c=gcfg();
  if(!c.token||!c.gistId){ if(!silent)setSyncStatus("Enter a token and gist id first, or create a Gist","err"); return; }
  if(!navigator.onLine){ if(!silent)setSyncStatus("You're offline, connect to the internet before syncing","err"); setSyncDot("off"); return; }
  if(syncing) return;
  syncing=true; setSyncDot("busy"); updateSyncTitle("busy"); if(!silent)setSyncStatus("Syncing...","");
  try{
    const r=await gistApi("GET","/"+c.gistId);
    const file=r.files&&r.files[GIST_FILE];
    let remoteChanged=false;
    if(file){
      let content=file.content;
      if(file.truncated&&file.raw_url) content=await (await fetch(file.raw_url)).text();
      const remote=await parsePayload(content);
      if(remote&&remote.days) remoteChanged=mergeDays(remote.days);
      if(remote&&mergeCategories(remote.categories,remote.categoriesUpdated)) remoteChanged=true;
      if(remote&&mergeRecurring(remote.recurring,remote.recurringUpdated)) remoteChanged=true;
      if(remote&&mergeTemplates(remote.templates,remote.templatesUpdated)) remoteChanged=true;
      if(remote&&mergeTermRange(remote.termRange,remote.termRangeUpdated)) remoteChanged=true;
    }
    if(remoteChanged){ saveState(false); renderAll(); }
    const content=await buildPayload();
    await gistApi("PATCH","/"+c.gistId,{files:{[GIST_FILE]:{content}}});
    c.lastSync=Date.now(); saveState(false);
    setSyncDot("ok"); updateSyncTitle("ok");
    if(!silent) setSyncStatus("Synced · "+new Date().toLocaleTimeString(),"ok");
    if(remoteChanged) toast("Updated from another device");
    else if(!silent) toast("Synced");
  }catch(e){ setSyncDot("err"); updateSyncTitle("err"); if(!silent) setSyncStatus("Sync failed: "+e.message,"err"); }
  finally{ syncing=false; }
}
async function createGist(){
  setSyncStatus("Creating a new Gist...","");setSyncDot("busy");
  try{
    const content=await buildPayload();
    const r=await gistApi("POST","",{description:"Daily Planner — sync data",public:false,files:{[GIST_FILE]:{content}}});
    gcfg().gistId=r.id; saveState(false);
    const gi=$("#gGistId"); if(gi) gi.value=r.id;
    setSyncStatus("Gist created · id saved automatically — copy the Sync Code to use on other devices","ok"); setSyncDot("ok"); updateSyncTitle("ok");
    toast("Gist created and data pushed");
  }catch(e){setSyncStatus("Failed to create: "+e.message,"err");setSyncDot("err");}
}
/* force = overwrite in one direction only, used when you want to force it */
async function forcePush(){
  const c=gcfg(); if(!c.token||!c.gistId){setSyncStatus("Enter a token and gist id first","err");return;}
  setSyncStatus("Pushing to the cloud (overwrite)...","");setSyncDot("busy");
  try{ const content=await buildPayload(); await gistApi("PATCH","/"+c.gistId,{files:{[GIST_FILE]:{content}}}); c.lastSync=Date.now(); saveState(false); setSyncStatus("Pushed to the cloud successfully","ok");setSyncDot("ok");updateSyncTitle("ok");toast("Pushed"); }
  catch(e){setSyncDot("err");setSyncStatus("Push failed: "+e.message,"err");}
}
async function forcePull(){
  const c=gcfg(); if(!c.token||!c.gistId){setSyncStatus("Enter a token and gist id first","err");return;}
  if(!confirm("Pull data from the cloud and overwrite everything on this device?")) return;
  setSyncStatus("Pulling to this device (overwrite)...","");setSyncDot("busy");
  try{
    const r=await gistApi("GET","/"+c.gistId);
    const file=r.files&&r.files[GIST_FILE];
    if(!file)throw new Error("No data file found in the Gist");
    let content=file.content;
    if(file.truncated&&file.raw_url) content=await (await fetch(file.raw_url)).text();
    const remote=await parsePayload(content);
    state.days=remote.days||{}; state.lastModified=remote.lastModified||Date.now();
    saveState(false); renderAll();
    setSyncStatus("Pulled to this device successfully","ok");setSyncDot("ok");updateSyncTitle("ok");toast("Data pulled from the cloud");
  }catch(e){setSyncDot("err");setSyncStatus("Pull failed: "+e.message,"err");}
}
function scheduleAutoSync(){
  const c=gcfg();
  if(!c.auto||!c.token||!c.gistId)return;
  setSyncDot("pending"); updateSyncTitle("pending");
  clearTimeout(syncTimer);
  syncTimer=setTimeout(()=>{ if(navigator.onLine) syncNow(true); },4000);
}
let focusTimer=null;
function syncOnFocus(){
  const c=gcfg(); if(!c.token||!c.gistId||!navigator.onLine)return;
  clearTimeout(focusTimer);
  focusTimer=setTimeout(()=>syncNow(true),700);
}

  openModal(`

      <div class="field"><label>Paste Sync Code from another device <span class="hint">(move devices in one step)</span></label>

      <div class="field"><label>Encryption passphrase <span class="hint">(leave blank = no encryption)</span></label>
        <input type="password" id="gPass" placeholder="${cryptoOk?'Secret passphrase for encrypting data':'This browser can\'t encrypt'}" value="${escapeAttr(c.pass||"")}" ${cryptoOk?"":"disabled"}>
        <span class="hint">Use the same value on every device so they can read each other's data</span></div>
      <div class="checkbox-row"><input type="checkbox" id="gAuto" ${c.auto?"checked":""}><label for="gAuto">Auto-sync (on edit + when opening/switching to the app)</label></div>

      <div class="divider"></div>
      <button class="btn primary" id="codeCopy" style="width:100%;margin-bottom:9px">Copy this device's Sync Code</button>
      <div class="btn-grid">
        <button class="btn primary" id="gSmartBtn">Sync now</button>
        <button class="btn" id="gCreateBtn">Create New Gist</button>
        <button class="btn sm" id="gPullBtn">Pull (force)</button>
        <button class="btn sm" id="gPushBtn">Push (force)</button>
      </div>
      <span class="hint" style="display:block;margin-top:10px">The Sync Code contains your token — keep it secret. Send it to yourself via Universal Clipboard / AirDrop</span>
    </div>
    <div class="modal-foot"><button class="btn primary" data-close>Done</button></div>
  `);
  const persist=()=>{ const g=gcfg(); g.token=$("#gToken").value.trim(); g.gistId=$("#gGistId").value.trim(); g.pass=cryptoOk?$("#gPass").value:""; g.auto=$("#gAuto").checked; saveState(false); updateSyncDotIdle(); };
  ["gToken","gGistId","gPass","gAuto"].forEach(id=>{const el=$("#"+id);el.addEventListener("change",persist);el.addEventListener("input",persist);});
  $("#gSmartBtn").onclick=()=>{persist();syncNow(false);};
  $("#gCreateBtn").onclick=()=>{persist(); if(!gcfg().token){setSyncStatus("Enter a token before creating a Gist","err");return;} createGist();};
  $("#gPullBtn").onclick=()=>{persist();forcePull();};
  $("#gPushBtn").onclick=()=>{persist();forcePush();};
  $("#codeCopy").onclick=async()=>{ persist(); if(!gcfg().token||!gcfg().gistId){toast("Set up a token + create a Gist first");return;} const ok=await copyText(makeSyncCode()); toast(ok?"Sync Code copied":"Couldn't copy — try copying it manually"); };
  $("#codeApply").onclick=()=>{ try{ applySyncCode($("#codeInput").value); $("#gToken").value=gcfg().token; $("#gGistId").value=gcfg().gistId; $("#gPass").value=gcfg().pass; updateSyncDotIdle(); setSyncStatus("Code applied · pulling data...","ok"); syncNow(false); }catch(e){ setSyncStatus("Invalid code: "+e.message,"err"); toast("Invalid Sync Code"); } };
}
function updateSyncDotIdle(){ const c=gcfg(); setSyncDot(c.token&&c.gistId?"ok":"off"); updateSyncTitle("ok"); }

/* ===================== help ===================== */
/* ===================== day templates ===================== */
function renderTplListHtml(){
  if(!(state.templates||[]).length) return '<div class="list-empty">No templates yet — save one below</div>';
  return state.templates.map(t=>
    '<div class="tpl-row" data-id="'+t.id+'">'+
      '<div class="tpl-info"><input type="text" class="tpl-name-input" value="'+escapeAttr(t.name)+'"><span class="tpl-meta">'+t.blocks.length+' block(s)</span></div>'+
      '<button type="button" class="btn sm tpl-apply">Apply to today</button>'+
      '<button type="button" class="tpl-del" aria-label="Delete template"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6"/></svg></button>'+
    '</div>'
  ).join("");
}
function bindTplListEvents(){
  $$(".tpl-row").forEach(row=>{
    const id=row.dataset.id, tpl=(state.templates||[]).find(t=>t.id===id);
    if(!tpl)return;
    $(".tpl-name-input",row).addEventListener("blur",e=>{
      const v=e.target.value.trim();
      if(v&&v!==tpl.name){ tpl.name=v; tpl.u=Date.now(); state.templatesUpdated=Date.now(); saveState(false); }
      else e.target.value=tpl.name;
    });
    $(".tpl-name-input",row).addEventListener("keydown",e=>{ if(e.key==="Enter")e.target.blur(); });
    $(".tpl-apply",row).onclick=()=>{
      const day=getDay(currentKey);
      const clones=tpl.blocks.map(b=>({id:uid(),title:b.title,start:b.start,end:b.end,color:b.color,categoryId:b.categoryId||null,note:b.note||""}));
      day.blocks.push(...clones);
      saveState(); closeModal(); renderSchedule();
      toast('Added "'+tpl.name+'" ('+clones.length+' block(s)) to today');
    };
    $(".tpl-del",row).onclick=()=>{
      if(!confirm('Delete template "'+tpl.name+'"?')) return;
      const removed=tpl;
      state.templates=state.templates.filter(t=>t.id!==id);
      state.templatesUpdated=Date.now(); saveState(false);
      $("#tplList").innerHTML=renderTplListHtml();
      bindTplListEvents();
      pushUndo(()=>{ state.templates=state.templates||[]; state.templates.push(removed); state.templatesUpdated=Date.now(); saveState(false); });
      toast("Template deleted","Undo",()=>{ if(lastUndo)lastUndo.restoreFn(); });
    };
  });
}
function openTemplateModal(){
  const dObj=dateFromKey(currentKey);
  const dayLabel=dObj.getDate()+" "+MON_SHORT[dObj.getMonth()]+" "+dObj.getFullYear();
  openModal(`
    <div class="modal-head"><h3>Day Templates</h3>
      <button class="x" data-close aria-label="Close"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg></button></div>
    <div class="modal-body">
      <div class="sync-status">"Apply to today" refers to the day you're currently viewing (${dayLabel}) — it adds blocks, it doesn't delete existing ones</div>
      <div id="tplList">${renderTplListHtml()}</div>
      <div class="divider"></div>
      <div class="field"><label>Save today as a new template</label>
        <div style="display:flex;gap:8px">
          <input type="text" id="newTplName" placeholder="Name this template" style="flex:1;min-width:0">
          <button class="btn sm primary" id="saveTplBtn">Save</button>
        </div>
      </div>
    </div>
    <div class="modal-foot"><button class="btn primary" data-close>Done</button></div>
  `);
  bindTplListEvents();
  $("#saveTplBtn").onclick=()=>{
    const name=$("#newTplName").value.trim();
    if(!name){toast("Enter a template name first");return;}
    const day=getDay(currentKey);
    if(!day.blocks.length){toast("Today has no blocks to save as a template yet");return;}
    const snap=day.blocks.map(b=>({title:b.title,start:b.start,end:b.end,color:b.color,categoryId:b.categoryId||null,note:b.note||""}));
    const tpl={id:uid(),name,blocks:snap,createdAt:Date.now(),u:Date.now()};
    state.templates=state.templates||[]; state.templates.push(tpl);
    state.templatesUpdated=Date.now(); saveState(false);
    openTemplateModal();
    toast("Template saved");
  };
}

function openHelp(){
  openModal(`
    <div class="modal-head"><h3>How to Use</h3>
      <button class="x" data-close aria-label="Close"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg></button></div>
    <div class="modal-body" style="font-size:14px;line-height:1.65;color:var(--ink-soft)">
      <p style="margin:0 0 12px"><b style="color:var(--ink)">Timeline</b> — Tap the "Block" button or tap an empty spot on the timeline to add a time block. Set start/end time and color. Tap a block to edit/delete it. The dashed red line marks the current time.</p>
      <p style="margin:0 0 12px"><b style="color:var(--ink)">Class Schedule</b> — On the add-block screen, tap the "Class" tab to create a subject that repeats weekly (subject name + room + class days, with a one-tap Mon–Fri select). Set "Term dates" on the same screen — classes only show up within that range, and it's shared across all classes.</p>
      <p style="margin:0 0 12px"><b style="color:var(--ink)">Task List</b> — Type and press Enter to add a task · tap the text to edit · drag the handle on the left to reorder · flag icon = mark as important</p>
      <p style="margin:0 0 12px"><b style="color:var(--ink)">Notes/Journal</b> — A free-form note per day, saved automatically</p>
      <p style="margin:0 0 12px"><b style="color:var(--ink)">Data</b> — Everything is saved locally and automatically (open this file directly in a browser for it to persist) · the ⋯ menu has export/import file options · set up sync via GitHub Gist to use across devices</p>
      <p style="margin:0;font-family:var(--mono);font-size:11.5px;color:var(--ink-faint)">Syncing requires an internet connection and a GitHub token (scope: gist) — you can add a passphrase to encrypt before uploading</p>
    </div>
    <div class="modal-foot"><button class="btn primary" data-close>Got it</button></div>
  `);

/* ===================== modal infra ===================== */
const overlay=$("#overlay");
function openModal(html){
  overlay.innerHTML='<div class="modal">'+html+'</div>';
  overlay.classList.add("open");
  overlay.querySelectorAll("[data-close]").forEach(b=>b.onclick=closeModal);
  overlay.onclick=e=>{ if(e.target===overlay)closeModal(); };
}
function closeModal(){ overlay.classList.remove("open"); overlay.innerHTML=""; }
document.addEventListener("keydown",e=>{ if(e.key==="Escape"&&overlay.classList.contains("open"))closeModal(); });

/* ===================== util ===================== */
function escapeHtml(s){return String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}
function escapeAttr(s){return escapeHtml(s).replace(/'/g,"&#39;");}
function placeCaretEnd(el){const r=document.createRange();r.selectNodeContents(el);r.collapse(false);const s=getSelection();s.removeAllRanges();s.addRange(r);}
/* ===================== undo ===================== */
let lastUndo=null, undoTimer=null;
function pushUndo(restoreFn){
  lastUndo={restoreFn};
  clearTimeout(undoTimer);
  undoTimer=setTimeout(()=>{lastUndo=null;},5000);
}
function toast(msg,actionLabel,actionFn){
  const t=document.createElement("div"); t.className="toast";
  const span=document.createElement("span"); span.textContent=msg; t.appendChild(span);
  if(actionLabel&&actionFn){
    const b=document.createElement("button"); b.type="button"; b.className="toast-action"; b.textContent=actionLabel;
    b.onclick=()=>{ actionFn(); dismiss(); };
    t.appendChild(b);
  }
  $("#toasts").appendChild(t);
  const dismiss=()=>{ clearTimeout(hideTimer); t.style.transition="opacity .3s"; t.style.opacity="0"; setTimeout(()=>t.remove(),300); };
  const hideTimer=setTimeout(dismiss,actionLabel?5000:2200);
}
$("#addBlock").onclick=()=>openBlockModal(null,540);

/* ===================== init ===================== */
(function init(){
  setTheme(state.settings.theme||"light");
  updateSyncDotIdle();
  renderAll();
  tick(); setInterval(tick,30000);
  // scroll timeline to now (or 7am)
  setTimeout(()=>{
    const w=$("#tlWrap"); if(!w)return;
    const n=new Date(); const mins=currentKey===todayKey()?n.getHours()*60+n.getMinutes():7*60;
    w.scrollTop=Math.max(0,mins*PMIN-120);
  },80);
  // auto-sync on load (pull-merge-push) + sync when opening/switching back to the app
  const c=gcfg();
  if(c.token&&c.gistId&&navigator.onLine){ syncNow(true).catch(()=>{}); }
  document.addEventListener("visibilitychange",()=>{ if(document.visibilityState==="visible") syncOnFocus(); });
  window.addEventListener("focus",syncOnFocus);
  window.addEventListener("online",()=>{ updateSyncDotIdle(); syncOnFocus(); });
  window.addEventListener("offline",()=>setSyncDot("off"));
})();
</script>
